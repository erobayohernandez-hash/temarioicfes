<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temario ICFES</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e10;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --text: #f0eee8;
    --muted: #888884;
    --faint: #444440;

    --mates: #4f8ef7;
    --mates-bg: rgba(79,142,247,0.08);
    --mates-glow: rgba(79,142,247,0.15);

    --lectura: #3ecf8e;
    --lectura-bg: rgba(62,207,142,0.08);
    --lectura-glow: rgba(62,207,142,0.15);

    --naturales: #f06292;
    --naturales-bg: rgba(240,98,146,0.08);
    --naturales-glow: rgba(240,98,146,0.15);

    --ingles: #a78bfa;
    --ingles-bg: rgba(167,139,250,0.08);
    --ingles-glow: rgba(167,139,250,0.15);

    --sociales: #fbbf24;
    --sociales-bg: rgba(251,191,36,0.08);
    --sociales-glow: rgba(251,191,36,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* header */
  .header {
    margin-bottom: 3rem;
  }

  .header-eyebrow {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  .header h1 span {
    background: linear-gradient(90deg, #4f8ef7, #a78bfa, #f06292);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    max-width: 460px;
  }

  /* stats row */
  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill strong {
    color: var(--text);
    font-weight: 500;
  }

  /* component cards */
  .comp-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 16px;
    margin-bottom: 0.75rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .comp-card:hover {
    border-color: var(--border-hover);
  }

  .comp-card.open {
    border-color: var(--accent-color);
  }

  .comp-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    user-select: none;
    position: relative;
  }

  .comp-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: var(--accent-bg);
    color: var(--accent-color);
    transition: transform 0.2s;
  }

  .comp-header:hover .comp-icon {
    transform: scale(1.05);
  }

  .comp-info { flex: 1; min-width: 0; }

  .comp-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .comp-desc {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 1px;
  }

  .comp-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .comp-count {
    font-size: 11px;
    color: var(--accent-color);
    background: var(--accent-bg);
    padding: 3px 10px;
    border-radius: 99px;
    font-weight: 500;
    white-space: nowrap;
  }

  .comp-chevron {
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--faint);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), color 0.2s;
    flex-shrink: 0;
  }

  .open .comp-chevron {
    transform: rotate(180deg);
    color: var(--accent-color);
  }

  .comp-body {
    display: none;
    border-top: 0.5px solid var(--border);
  }

  .comp-body.open { display: block; }

  /* general themes */
  .gen-theme {
    border-bottom: 0.5px solid var(--border);
  }

  .gen-theme:last-child { border-bottom: none; }

  .gen-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0.8rem 1.25rem 0.8rem 1.5rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }

  .gen-header:hover {
    background: rgba(255,255,255,0.025);
  }

  .gen-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-color);
    flex-shrink: 0;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .gen-header:hover .gen-dot,
  .gen-theme.open .gen-dot {
    opacity: 1;
  }

  .gen-name {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }

  .gen-badge {
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 2px 9px;
    border-radius: 99px;
    flex-shrink: 0;
  }

  .gen-arr {
    font-size: 12px;
    color: var(--faint);
    transition: transform 0.2s, color 0.2s;
    flex-shrink: 0;
  }

  .gen-theme.open .gen-arr {
    transform: rotate(90deg);
    color: var(--accent-color);
  }

  /* specific topics */
  .spec-list {
    display: none;
    padding: 0.5rem 1.25rem 1rem 2.75rem;
  }

  .spec-list.open { display: block; }

  .spec-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 0;
    font-size: 13px;
    color: rgba(240,238,232,0.65);
    font-weight: 300;
    line-height: 1.5;
    border-bottom: 0.5px solid rgba(255,255,255,0.03);
  }

  .spec-item:last-child { border-bottom: none; }

  .spec-dash {
    color: var(--accent-color);
    flex-shrink: 0;
    margin-top: 1px;
    opacity: 0.6;
    font-size: 11px;
  }

  /* progress bar on header */
  .progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 1px;
    background: var(--accent-color);
    opacity: 0;
    transition: opacity 0.3s, width 0.4s;
    width: 0%;
  }

  .comp-card.open .progress-bar {
    opacity: 0.4;
    width: 100%;
  }

  /* search */
  .search-wrap {
    position: relative;
    margin-bottom: 1.75rem;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--faint);
    font-size: 15px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 40px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--faint); }

  .search-input:focus {
    border-color: var(--border-hover);
  }

  .no-results {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    padding: 3rem 0;
    display: none;
  }

  .highlight {
    background: rgba(251,191,36,0.25);
    color: var(--text);
    border-radius: 2px;
    padding: 0 2px;
  }

  /* footer */
  .footer {
    text-align: center;
    color: var(--faint);
    font-size: 12px;
    margin-top: 3rem;
    font-weight: 300;
  }

  /* animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .comp-card {
    animation: fadeUp 0.4s ease both;
  }

  .comp-card:nth-child(1) { animation-delay: 0.05s; }
  .comp-card:nth-child(2) { animation-delay: 0.10s; }
  .comp-card:nth-child(3) { animation-delay: 0.15s; }
  .comp-card:nth-child(4) { animation-delay: 0.20s; }
  .comp-card:nth-child(5) { animation-delay: 0.25s; }

  @media (max-width: 480px) {
    .wrap { padding: 2rem 1rem 4rem; }
    .comp-count { display: none; }
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="header">
    <div class="header-eyebrow">Preparación · Saber 11</div>
    <h1>Temario <span>ICFES</span></h1>
    <p class="header-sub">Solo los temas que realmente aparecen en las pruebas, extraídos directamente de los cuadernillos.</p>
  </div>

  <div class="stats">
    <div class="stat-pill"><strong>5</strong> componentes</div>
    <div class="stat-pill"><strong>22</strong> temas generales</div>
    <div class="stat-pill"><strong>78</strong> temas específicos</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input class="search-input" type="text" id="searchInput" placeholder="Buscar un tema específico...">
  </div>

  <div id="accordion"></div>
  <div class="no-results" id="noResults">No se encontraron temas para "<span id="noQuery"></span>"</div>

  <div class="footer">Generado desde tus archivos de Drive · ICFES 2025–2026</div>
</div>

<script>
const data = [
  {
    id: "mates",
    title: "Matemáticas",
    desc: "Componente cuantitativo",
    icon: "∑",
    color: "var(--mates)",
    bg: "var(--mates-bg)",
    themes: [
      { name: "Estadística y probabilidad", topics: [
        "Lectura e interpretación de tablas, barras, circulares y gráficas de línea",
        "Media, mediana, moda y rango — qué pasa al eliminar o agregar un dato",
        "Comparar medidas de tendencia central entre tablas diferentes",
        "Probabilidad simple: casos favorables sobre total de posibles",
        "Proporcionalidad directa e inversa — identificar cuál aplica y argumentarlo"
      ]},
      { name: "Geometría", topics: [
        "Teorema de Pitágoras: calcular lado faltante, perímetros y cuerdas",
        "Áreas de figuras compuestas (rectángulos con zonas quitadas, triángulos internos)",
        "Ángulos internos de polígonos regulares e irregulares y sus sumas",
        "Relaciones entre rectas paralelas, perpendiculares y sus consecuencias lógicas",
        "Volumen de esferas, pirámides y cilindros — énfasis en errores de procedimiento"
      ]},
      { name: "Álgebra y funciones", topics: [
        "Dominio de funciones con raíces cuadradas y fracciones con denominador variable",
        "Expresiones algebraicas: identificar qué procedimiento es correcto o incorrecto",
        "Variación lineal vs. no lineal: reconocer cuál crece de forma proporcional",
        "Notación científica: multiplicar y dividir potencias de 10",
        "Cuadrado de binomios y operaciones algebraicas con pasos"
      ]},
      { name: "Combinatoria y conteo", topics: [
        "Combinaciones vs. permutaciones: cuál aplica según el problema y por qué",
        "Contar posibilidades con restricciones (elementos fijos, sin repetición)",
        "Razonamiento sobre errores en conteos: cuántas opciones se cuentan de más o de menos"
      ]},
      { name: "Razonamiento lógico-matemático", topics: [
        "Analizar procedimientos paso a paso e identificar en cuál está el error",
        "Deducir qué dato adicional falta para poder resolver un problema",
        "Interpretar afirmaciones sobre resultados y evaluar si son verdaderas o falsas"
      ]}
    ]
  },
  {
    id: "lectura",
    title: "Lectura crítica",
    desc: "Comprensión e interpretación textual",
    icon: "L",
    color: "var(--lectura)",
    bg: "var(--lectura-bg)",
    themes: [
      { name: "Tipos de texto frecuentes", topics: [
        "Textos argumentativos: artículos de opinión, columnas, cartas",
        "Textos literarios: fragmentos de novela, poesía, cuento",
        "Textos históricos y coloniales: crónicas y documentos de época",
        "Textos informativos y científicos: noticias, reportes, divulgación"
      ]},
      { name: "Vocabulario en contexto", topics: [
        "Reemplazar una palabra subrayada sin alterar el sentido del texto",
        "Interpretar expresiones figuradas o arcaicas según el contexto inmediato"
      ]},
      { name: "Comprensión e interpretación", topics: [
        "Identificar la tesis, idea central o argumento principal",
        "Distinguir argumento, premisa y conclusión dentro del texto",
        "Inferir lo que el texto no dice explícitamente",
        "Identificar la intención del autor: ¿para qué escribe? ¿a quién le habla?",
        "Determinar la función de un párrafo en relación con el texto completo"
      ]},
      { name: "Análisis crítico", topics: [
        "Identificar prejuicios, sesgos o posiciones implícitas del autor",
        "Reconocer afirmaciones que apoyan o debilitan un argumento dado",
        "Detectar opciones con generalizaciones extremas ('siempre', 'nunca') — casi siempre incorrectas",
        "Distinguir hechos de opiniones dentro del texto"
      ]}
    ]
  },
  {
    id: "naturales",
    title: "Ciencias naturales",
    desc: "Biología, química y física",
    icon: "⚛",
    color: "var(--naturales)",
    bg: "var(--naturales-bg)",
    themes: [
      { name: "Biología", topics: [
        "Relaciones entre organismos: simbiosis, parasitismo, mutualismo, competencia",
        "Adaptaciones de plantas y animales a entornos extremos (páramo, desierto, acuático)",
        "Ecosistemas y cadenas tróficas: qué ocurre al eliminar un eslabón",
        "Micorrizas, fotosíntesis y reproducción vegetal",
        "Leer datos de tabla o gráfica experimental y extraer la conclusión correcta",
        "Diseño experimental: variable de control, variable medida, hipótesis posible de responder"
      ]},
      { name: "Química", topics: [
        "Solubilidad y sus curvas: cómo cambia con la temperatura",
        "Viscosidad y poder calorífico: comparar propiedades entre sustancias",
        "Propiedades de mezclas y sustancias puras",
        "Reacciones químicas: identificar reactivos, productos y condiciones necesarias"
      ]},
      { name: "Física", topics: [
        "Energía cinética y potencial: conservación de la energía mecánica",
        "Fuerzas: gravitacional, magnética, electrostática y fricción",
        "Sistemas de poleas: predecir movimiento y condiciones de equilibrio",
        "Movimiento circular: distinguir dirección de velocidad vs. dirección de fuerza",
        "Cantidad de movimiento (momentum): cambios producidos por fuerzas aplicadas",
        "Campos magnéticos: electroimanes, líneas de campo, atracción de materiales ferromagnéticos"
      ]}
    ]
  },
  {
    id: "ingles",
    title: "Inglés",
    desc: "Comprensión lectora y gramática",
    icon: "E",
    color: "var(--ingles)",
    bg: "var(--ingles-bg)",
    themes: [
      { name: "Estructura fija de la prueba", topics: [
        "Parte 1 — Vocabulario: asociar descripción con la palabra correcta (matching)",
        "Parte 2 — Avisos y señales: identificar en qué lugar o contexto se vería cada letrero",
        "Parte 3 — Conversaciones cortas: elegir la respuesta apropiada al contexto",
        "Parte 4 — Fill in the blank: completar texto con la opción gramaticalmente correcta",
        "Parte 5 — Reading comprehension: textos medianos con 4-5 preguntas cada uno"
      ]},
      { name: "Gramática en fill in the blank", topics: [
        "Preposiciones de movimiento y lugar (go away, published as, provided with)",
        "Conectores y conjunciones (unless, whether, although, while)",
        "Verbos modales en contexto (might, would, could)",
        "Tiempos verbales en narración: presente perfecto, pasado simple, futuro"
      ]},
      { name: "Comprensión de lectura", topics: [
        "Identificar qué está haciendo el autor en el texto (propósito)",
        "Extraer información específica sobre un personaje o situación",
        "Interpretar el significado de una expresión o frase en contexto",
        "Inferir cuál sería la reacción o respuesta apropiada de un personaje"
      ]},
      { name: "Temas recurrentes en los textos", topics: [
        "Historias personales y familiares (cartas, deseos de padres a hijos)",
        "Museos, lugares históricos y personajes destacados",
        "Campamentos, educación y experiencias de vida",
        "Instrucciones, recetas o guías prácticas"
      ]}
    ]
  },
  {
    id: "sociales",
    title: "Sociales y ciudadanas",
    desc: "Historia, economía y ciudadanía",
    icon: "◉",
    color: "var(--sociales)",
    bg: "var(--sociales-bg)",
    themes: [
      { name: "Economía y política económica", topics: [
        "Medidas proteccionistas: aranceles, cuotas y sus efectos en industria e importaciones",
        "Oferta, demanda y formación de precios",
        "Impuestos, gasto público y redistribución",
        "Impactos económicos de decisiones de política: leer y analizar, no memorizar"
      ]},
      { name: "Derechos y ciudadanía", topics: [
        "Derechos laborales: igualdad salarial, condiciones de trabajo justas",
        "Derechos fundamentales vs. garantías del Estado colombiano",
        "Mecanismos de participación ciudadana",
        "Dilemas éticos: cuándo una medida es justa o injusta y con qué argumentos"
      ]},
      { name: "Historia", topics: [
        "Independencias hispanoamericanas: Junín, Simón Bolívar, Colombia y Perú",
        "Conquista y colonización: relaciones entre españoles e indígenas americanos",
        "Impactos de actividades económicas históricas sobre comunidades y territorio"
      ]},
      { name: "Medio ambiente y territorio", topics: [
        "Conflictos entre desarrollo económico y preservación ambiental",
        "Servicios ecosistémicos: qué son y cómo se afectan por actividades humanas",
        "Uso del suelo, recursos hídricos, bosques de niebla y páramos",
        "Minería, monocultivos y sus consecuencias sobre ecosistemas locales"
      ]},
      { name: "Patrón transversal de la prueba", topics: [
        "Siempre presentan posiciones en conflicto (empresa vs. comunidad, economía vs. ambiente)",
        "Preguntan cuál es el aspecto más importante o qué evidencia lleva a la conclusión",
        "Opciones con 'siempre' o 'nunca' casi siempre son incorrectas — eliminarlas primero",
        "Evaluar si una afirmación política o económica es verdadera con base en el texto dado"
      ]}
    ]
  }
];

const accordion = document.getElementById('accordion');
const searchInput = document.getElementById('searchInput');
const noResults = document.getElementById('noResults');
const noQuery = document.getElementById('noQuery');

function buildAccordion(filter = '') {
  accordion.innerHTML = '';
  let totalShown = 0;
  const q = filter.toLowerCase().trim();

  data.forEach(comp => {
    const matchedThemes = comp.themes.map(theme => {
      const topics = theme.topics.filter(t =>
        !q || t.toLowerCase().includes(q) || theme.name.toLowerCase().includes(q) || comp.title.toLowerCase().includes(q)
      );
      return { ...theme, topics };
    }).filter(t => t.topics.length > 0);

    if (q && matchedThemes.length === 0) return;
    totalShown++;

    const card = document.createElement('div');
    card.className = 'comp-card';
    card.style.setProperty('--accent-color', comp.color);
    card.style.setProperty('--accent-bg', comp.bg);

    const totalTopics = matchedThemes.reduce((a, t) => a + t.topics.length, 0);

    card.innerHTML = `
      <div class="comp-header" data-id="${comp.id}">
        <div class="comp-icon">${comp.icon}</div>
        <div class="comp-info">
          <div class="comp-name">${comp.title}</div>
          <div class="comp-desc">${comp.desc}</div>
        </div>
        <div class="comp-meta">
          <span class="comp-count">${matchedThemes.length} temas · ${totalTopics} subtemas</span>
          <div class="comp-chevron">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2.5 5L7 9.5L11.5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="progress-bar"></div>
      </div>
      <div class="comp-body ${q ? 'open' : ''}">
        ${matchedThemes.map(theme => `
          <div class="gen-theme ${q ? 'open' : ''}">
            <div class="gen-header">
              <span class="gen-dot"></span>
              <span class="gen-name">${highlight(theme.name, q)}</span>
              <span class="gen-badge">${theme.topics.length}</span>
              <span class="gen-arr">›</span>
            </div>
            <div class="spec-list ${q ? 'open' : ''}">
              ${theme.topics.map(t => `
                <div class="spec-item">
                  <span class="spec-dash">—</span>
                  <span>${highlight(t, q)}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `;

    // comp toggle
    card.querySelector('.comp-header').addEventListener('click', () => {
      const body = card.querySelector('.comp-body');
      const isOpen = card.classList.contains('open');
      card.classList.toggle('open', !isOpen);
      body.classList.toggle('open', !isOpen);
    });

    // gen toggles
    card.querySelectorAll('.gen-header').forEach(gh => {
      gh.addEventListener('click', (e) => {
        e.stopPropagation();
        const gt = gh.parentElement;
        const sl = gt.querySelector('.spec-list');
        const isOpen = gt.classList.contains('open');
        gt.classList.toggle('open', !isOpen);
        sl.classList.toggle('open', !isOpen);
      });
    });

    accordion.appendChild(card);
  });

  const empty = totalShown === 0;
  noResults.style.display = empty ? 'block' : 'none';
  noQuery.textContent = filter;
}

function highlight(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark class="highlight">$1</mark>');
}

searchInput.addEventListener('input', () => {
  buildAccordion(searchInput.value);
});

buildAccordion();
</script>
</body>
</html>
